<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Showcase</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
  <input type="text"  id="searchInput" placeholder="Search products or prices...">
    <div id="filterBar" class="filter-bar"></div>
    <div id="categoryTitle" class="category-title"></div>
    <div id="gallery" class="gallery"></div>
    <div id="combo-gallery" class="combo-gallery"></div>
    
    <div id="videoModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeVideo()">&times;</span>
        <video id="videoPlayer" controls></video>
        <div class="video-info">
          <h3 id="infoTitle"></h3>
          <ul id="infoList"></ul>
        </div>
    
      </div>
    </div>


    <script src="products.js"></script>
    <script src="script.js"></script>
    
</body>
</html>
